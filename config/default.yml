git:
  diff_mode: "head"
  max_diff_lines: 2000
  exclude_patterns:
    - "*.lock"
    - "*.min.js"
    - "vendor/**"

agent:
  name: "gemini"
  timeout_seconds: 120

thresholds:
  max_critical_issues: 0
  max_warnings: 5
  require_tests_for_new_code: true

decision:
  block_on_critical: true
  block_on_warning_threshold: true
  block_on_agent_failure: false
